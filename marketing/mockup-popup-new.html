<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volux Popup Mockup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #08080a;
      --bg-secondary: #0f0f12;
      --bg-elevated: #1c1c20;
      --gold-400: #c9a962;
      --gold-gradient: linear-gradient(135deg, #e8d5a3 0%, #c9a962 30%, #b8954a 70%, #9a7b3c 100%);
      --gold-glow: rgba(201, 169, 98, 0.12);
      --text-primary: #fafafa;
      --text-secondary: #9a9a9f;
      --text-muted: #56565a;
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2a2a2a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px;
    }

    .popup {
      width: 380px;
      background: var(--bg-primary);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--glass-border);
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gold-gradient);
      opacity: 0.4;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 28px;
      height: 28px;
      color: var(--gold-400);
    }

    .brand-text {
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 18px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .header-btn svg {
      width: 18px;
      height: 18px;
    }

    .content {
      padding: 16px 20px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .domain-input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
    }

    .add-btn {
      padding: 10px 12px;
      background: var(--gold-gradient);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .add-btn svg {
      width: 20px;
      height: 20px;
      color: #0a0a0a;
    }

    .domain-card {
      background: linear-gradient(165deg, rgba(28, 28, 32, 0.9) 0%, rgba(15, 15, 18, 0.95) 100%);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }

    .domain-card.audible {
      border-color: rgba(201, 169, 98, 0.25);
      box-shadow: 0 8px 40px rgba(201, 169, 98, 0.2);
    }

    .domain-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .favicon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .domain-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .tab-count {
      font-size: 9px;
      font-weight: 700;
      color: var(--gold-400);
      background: rgba(201, 169, 98, 0.1);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid rgba(201, 169, 98, 0.25);
    }

    .audible-icon {
      color: var(--gold-400);
    }

    .audible-icon svg {
      width: 18px;
      height: 18px;
    }

    .domain-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mute-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .mute-btn svg {
      width: 18px;
      height: 18px;
    }

    .slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .slider {
      flex: 1;
      height: 5px;
      background: linear-gradient(to right, #c9a962 0%, #c9a962 75%, #2a2a2a 75%, #2a2a2a 100%);
      border-radius: 100px;
      position: relative;
    }

    .slider-thumb {
      position: absolute;
      width: 18px;
      height: 18px;
      background: var(--gold-gradient);
      border-radius: 50%;
      top: 50%;
      left: 75%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 10px rgba(201, 169, 98, 0.4);
      border: 2px solid #f5e6c4;
    }

    .volume-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 44px;
      text-align: right;
    }

    .footer {
      padding: 16px 24px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .footer-text span {
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
    }

    .pro-badge {
      background: var(--gold-gradient);
      color: #0a0a0a;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="title">
        <svg class="logo" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <span class="brand-text">Volux</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" title="Scan tabs">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
        <button class="header-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="content">
      <div class="add-form">
        <input type="text" class="domain-input" placeholder="Enter domain (e.g. youtube.com)">
        <button class="add-btn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </div>

      <div class="domain-card audible">
        <div class="domain-header">
          <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64" class="favicon" alt="">
          <span class="domain-name">youtube.com</span>
          <span class="tab-count">2 TABS</span>
          <span class="audible-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
          </span>
        </div>
        <div class="domain-controls">
          <button class="mute-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <div class="slider-container">
            <div class="slider">
              <div class="slider-thumb"></div>
            </div>
            <span class="volume-value">75%</span>
          </div>
        </div>
      </div>

      <div class="domain-card">
        <div class="domain-header">
          <img src="https://www.google.com/s2/favicons?domain=spotify.com&sz=64" class="favicon" alt="">
          <span class="domain-name">spotify.com</span>
          <span class="tab-count">1 TAB</span>
        </div>
        <div class="domain-controls">
          <button class="mute-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <div class="slider-container">
            <div class="slider" style="background: linear-gradient(to right, #c9a962 0%, #c9a962 100%, #2a2a2a 100%, #2a2a2a 100%);">
              <div class="slider-thumb" style="left: 100%;"></div>
            </div>
            <span class="volume-value">100%</span>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p class="footer-text">Precision <span>Audio</span> Control</p>
      <div class="footer-actions">
        <button class="pro-badge">PRO</button>
      </div>
    </footer>
  </div>
</body>
</html>
